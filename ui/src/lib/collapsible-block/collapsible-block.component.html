<div class="collapseable-block" id="block.id">
  <button (click)="changeBlockVisible()" class="btn-section-toggle">
    <span>{{ title() }}</span>
    @if (canBeEdited() && !isNew() && !_block().editMode && !isChanged()) {
      <button
        class="btn btn-link btn-icon btn-sm"
        (click)="clickToggleEdit($event)"
        title="Редактировать"
      >
        ✏️
      </button>
    }
    <span class="btn-section-toggle__roll-up-wrap">
      @if (showCustomBtn()) {
        <button
          type="button"
          class="btn btn-link btn-icon btn-sm"
          [title]="customBtnTitle()"
          (click)="clickCustomBtn($event)"
        >
          <svg
            width="18"
            height="22"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <use [attr.xlink:href]="customBtnSvgId()" />
          </svg>
        </button>
      }
      @if (_block().visible) {
        <svg
          class="collapse-icon"
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="currentColor"
          aria-hidden="true"
        >
          <path d="M8 10L3 5h10L8 10z" />
        </svg>
      } @else {
        <svg
          class="collapse-icon"
          width="16"
          height="16"
          viewBox="0 0 16 16"
          fill="currentColor"
          aria-hidden="true"
        >
          <path d="M8 6l5 5H3l5-5z" />
        </svg>
      }
    </span>
  </button>
  <div
    [@visible]="_block().visible"
    [ngClass]="{ 'edit-background': _block().editMode }"
    class="collapseable-block__content"
  >
    <ng-content></ng-content>
    @if (_block().editMode) {
      <div class="block-btns">
        <div
          (mouseover)="mouseOver.emit()"
          (focus)="mouseOver.emit()"
          tabindex="0"
          class="mouse"
          [style.z-index]="!isSaveBtnActive() ? 1 : 0"
        ></div>
        <button
          class="btn btn-sm btn-primary block-btns__item block-btns__save-btn"
          [disabled]="!isSaveBtnActive()"
          (click)="saveBtnClick.emit()"
          [style.z-index]="!isSaveBtnActive() ? 0 : 1"
        >
          Сохранить
        </button>
        @if (additionalBtn()) {
          <button
            class="btn btn-sm block-btns__item"
            (click)="additionalBtnClick.emit()"
          >
            {{ additionalBtn() }}
          </button>
        }
        <button
          class="btn btn-sm block-btns__item btn-link btn-red"
          (click)="cancelBtnClick.emit()"
        >
          Закрыть
        </button>
        <a
          href="javascript:void(0)"
          role="tooltip"
          aria-haspopup="true"
          class="tooltip tooltip-md tooltip-top-left"
          style="margin-left: auto"
        >
          @if (showDeleteBtn()) {
            <button
              [disabled]="!canBeDeleted()"
              class="btn btn-sm btn-warning-outline"
              (click)="deleteBtnClick.emit()"
            >
              Удалить
            </button>
          }
          <span
            class="tooltip-content"
            [style.display]="!canBeDeleted() ? 'block' : 'none'"
          >
            {{ deleteInfo() }}
          </span>
        </a>
      </div>
    }
  </div>
</div>
