name: Lint PR

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-affected:
    name: Lint Affected Projects
    runs-on: sotbi-runners
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Derive appropriate SHAs for base and head
        id: set-shas
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: 'main'

      - name: Show affected projects
        run: |
          echo "Base SHA: ${{ steps.set-shas.outputs.base }}"
          echo "Head SHA: ${{ steps.set-shas.outputs.head }}"
          echo "Affected projects:"
          npx nx show projects --affected --base=${{ steps.set-shas.outputs.base }} --head=${{ steps.set-shas.outputs.head }}

      - name: Run ESLint on affected projects
        run: |
          npx nx affected -t lint \
            --base=${{ steps.set-shas.outputs.base }} \
            --head=${{ steps.set-shas.outputs.head }} \
            --parallel=3 \
            --exclude=ui-ag-grid \
            --verbose

      - name: Check code formatting
        run: npx nx format:check --base=${{ steps.set-shas.outputs.base }} --head=${{ steps.set-shas.outputs.head }}

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const message = status === 'success'
              ? 'All lint checks passed!'
              : 'Lint checks failed. Please fix the errors and push again.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} **Lint Results**\n\n${message}\n\nBase: \`${{ steps.set-shas.outputs.base }}\`\nHead: \`${{ steps.set-shas.outputs.head }}\``
            });
