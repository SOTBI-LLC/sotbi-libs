name: Publish Packages (Manual with Token)

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (or "all" for all packages)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - utils
          - models
          - auth
          - data-access
          - state
          - ui
          - ui-ag-grid

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
    env:
      NPM_REGISTRY_URL: 'https://npm.bazys.io'
      NPM_TOKEN: ${{ secrets['NPM_TOKEN'] }}
      NODE_AUTH_TOKEN: ${{ secrets['NPM_TOKEN'] }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
          registry-url: 'https://npm.bazys.io'
          scope: '@sotbi'

      - name: Validate publish token
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi

      - name: Configure npm authentication
        run: |
          cat > "$HOME/.npmrc" << EOF
          registry=${NPM_REGISTRY_URL}
          @sotbi:registry=${NPM_REGISTRY_URL}
          //npm.bazys.io/:_authToken=${NPM_TOKEN}
          always-auth=true
          EOF

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: |
          if [ "${{ github.event.inputs.package }}" = "all" ]; then
            npx nx run-many -t build --exclude=ui-ag-grid
          else
            npx nx run ${{ github.event.inputs.package }}:build
          fi

      - name: Publish packages
        run: |
          if [ "${{ github.event.inputs.package }}" = "all" ]; then
            npx nx run-many -t nx-release-publish --exclude=ui-ag-grid
          else
            npx nx run ${{ github.event.inputs.package }}:nx-release-publish
          fi
