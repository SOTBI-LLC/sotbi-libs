name: Publish Packages (Manual with Token)

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (or "all" for all packages)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - utils
          - models
          - auth
          - data-access
          - state
          - ui
          - ui-ag-grid

jobs:
  publish:
    runs-on: sotbi-runners

    permissions:
      contents: read
    env:
      NPM_REGISTRY_URL: 'https://npm.bazys.io'
      NPM_TOKEN: ${{ secrets['NPM_TOKEN'] }}
      NODE_AUTH_TOKEN: ${{ secrets['NPM_TOKEN'] }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'
          registry-url: 'https://npm.bazys.io'
          scope: '@sotbi'

      - name: Validate publish token
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi

      - name: Configure npm authentication
        run: |
          cat > "$HOME/.npmrc" << EOF
          registry=${NPM_REGISTRY_URL}
          @sotbi:registry=${NPM_REGISTRY_URL}
          //npm.bazys.io/:_authToken=${NPM_TOKEN}
          always-auth=true
          EOF

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: |
          if [ "${{ github.event.inputs.package }}" = "all" ]; then
            npx nx run-many -t build
          else
            npx nx run ${{ github.event.inputs.package }}:build
          fi

      - name: Publish packages
        run: |
          if [ "${{ github.event.inputs.package }}" = "all" ]; then
            npx nx run-many -t nx-release-publish
          else
            npx nx run ${{ github.event.inputs.package }}:nx-release-publish
          fi

      - name: Get published version(s)
        id: version
        run: |
          if [ "${{ github.event.inputs.package }}" = "all" ]; then
            VERSIONS=$(for pkg in utils models auth data-access state ui ui-ag-grid; do
              [ -f "$pkg/package.json" ] && v=$(node -p "require('./$pkg/package.json').version" 2>/dev/null) && echo "$pkg@$v"
            done | tr '\n' ' ')
            echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./${{ github.event.inputs.package }}/package.json').version")
            echo "versions=${{ github.event.inputs.package }}@$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Send telegram message after image was built
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHANNEL }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ github.actor }} published new version of ${{ github.event.inputs.package }}.
            📦 Version(s): ${{ steps.version.outputs.versions }}
            👀 changes: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            View job logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
