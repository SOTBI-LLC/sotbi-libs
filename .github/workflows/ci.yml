name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: sotbi-runners
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install NX
        run: yarn global add nx

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set SHAs for Nx
        uses: nrwl/nx-set-shas@v4

      - name: Check formatting
        run: npx nx format:check
        continue-on-error: true

      - name: Run ESLint on affected projects
        run: npx nx run-many -t lint --parallel=3 --configuration=ci

  test:
    name: Test
    runs-on: sotbi-runners
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set SHAs for Nx
        uses: nrwl/nx-set-shas@v4

      - name: Run tests on affected projects
        run: npx nx affected -t test --parallel=3 --configuration=ci --coverage -- --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: junit.xml
          JEST_JUNIT_UNIQUE_OUTPUT_NAME: 'true'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Jest Test Results
          path: test-results/*.xml
          reporter: jest-junit
          fail-on-error: false
          fail-on-empty: false

  build:
    name: Build
    runs-on: sotbi-runners
    timeout-minutes: 15
    needs:
      - test
      - lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set SHAs for Nx
        uses: nrwl/nx-set-shas@v4

      - name: Build affected projects
        run: npx nx affected -t build --parallel=3 --configuration=production

      - name: Get and trim commit message
        id: commit_message
        shell: bash
        run: |
          set -euo pipefail

          # Safely read the commit message (subject + body) without breaking bash quoting.
          COMMIT_MSG="$(git log -1 --pretty=%B)"

          COMMIT_MSG_SINGLE_LINE="$(printf '%s' "$COMMIT_MSG" | tr '\n' ' ' | tr -s ' ')"
          TRIMMED_MSG="${COMMIT_MSG_SINGLE_LINE:0:512}"

          # Use a unique delimiter to avoid conflicts with commit content.
          DELIM="EOF_${RANDOM}_${RANDOM}"
          {
            echo "trimmed_message<<$DELIM"
            echo "$TRIMMED_MSG"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Send telegram message after build
        uses: an3park/telegram-action@v2
        # uses: appleboy/telegram-action@master
        with:
          chat_id: ${{ secrets.TELEGRAM_CHANNEL }}
          bot_token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: Markdown
          # to: ${{ secrets.TELEGRAM_CHANNEL }}
          # token: ${{ secrets.TELEGRAM_TOKEN }}
          text: |
            ${{ github.actor }} published new version of ${{ github.event.inputs.package }}.
            ${{ steps.commit_message.outputs.trimmed_message }}
            Used branch: ${{ env.branch }}
            👀 changes: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            View job logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
