name: Publish Packages

on:
  workflow_dispatch: # Ручной запуск
  push:
    tags:
      - 'v*' # Автоматически при создании тега

permissions:
  contents: read

jobs:
  publish:
    runs-on: sotbi-runners
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate publish token
        run: |
          if [ -z "${{ secrets['NPM_TOKEN'] }}" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi

      - name: Configure npm authentication
        run: |
          cat > "$HOME/.npmrc" << EOF
          @sotbi:registry=https://npm.bazys.io
          //npm.bazys.io/:_authToken=${{ secrets['NPM_TOKEN'] }}
          always-auth=true
          EOF

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Enable Corepack
        run: corepack enable

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Cache yarn dependencies
        uses: actions/cache@v5
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build all packages
        run: npx nx run-many -t build --configuration=production

      - name: Publish packages
        run: npx nx run-many -t nx-release-publish

      - name: Get published version(s)
        id: version
        run: |
          VERSIONS=$(for pkg in utils models auth data-access state ui ui-ag-grid; do
            [ -f "$pkg/package.json" ] && v=$(node -p "require('./$pkg/package.json').version" 2>/dev/null) && echo "$pkg@$v"
          done | tr '\n' ' ')
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT

      - name: Send telegram message after image was built
        uses: ./.github/actions/notify-telegram
        with:
          chat_id: ${{ secrets.TELEGRAM_CHANNEL }}
          bot_token: ${{ secrets.TELEGRAM_TOKEN }}
          text: |
            ${{ github.actor }} published new version of ${{ github.event.inputs.package }}.
            📦 Version(s): ${{ steps.version.outputs.versions }}
            👀 changes: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            View job logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
