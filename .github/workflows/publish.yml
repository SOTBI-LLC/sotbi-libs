name: Publish Packages

on:
  workflow_dispatch: # Ручной запуск
  push:
    tags:
      - "v*" # Автоматически при создании тега

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"

      - name: Configure npm authentication
        run: |
          cat > .npmrc << EOF
          @sotbi:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
          EOF
          echo "=== .npmrc configured ==="
          cat .npmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build all packages
        run: npx nx run-many -t build

      - name: Publish packages with npm
        run: |
          # Copy .npmrc to root for npm to find it
          cp .npmrc "$HOME/.npmrc"
          
          # Publish each package
          for package in dist/*/package.json; do
            dir=$(dirname "$package")
            package_name=$(node -p "require('$package').name")
            echo "Publishing $package_name from $dir"
            (cd "$dir" && npm publish --verbose) || echo "Failed to publish $package_name"
          done
