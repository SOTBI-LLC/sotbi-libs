name: Publish Packages

on:
  workflow_dispatch: # Ручной запуск
  push:
    tags:
      - 'v*' # Автоматически при создании тега

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_REGISTRY_URL: 'https://npm.bazys.io'
      NPM_TOKEN: ${{ secrets['NPM_TOKEN'] }}
      NODE_AUTH_TOKEN: ${{ secrets['NPM_TOKEN'] }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          registry-url: 'https://npm.bazys.io'

      - name: Validate publish token
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi

      - name: Configure npm authentication
        run: |
          cat > "$HOME/.npmrc" << EOF
          registry=${NPM_REGISTRY_URL}
          @sotbi:registry=${NPM_REGISTRY_URL}
          //npm.bazys.io/:_authToken=${NPM_TOKEN}
          always-auth=true
          EOF

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build all packages
        run: npx nx run-many -t build --exclude=ui-ag-grid

      - name: Publish packages
        run: npx nx run-many -t nx-release-publish --exclude=ui-ag-grid
