name: Publish Packages

on:
  workflow_dispatch: # Ручной запуск
  push:
    tags:
      - 'v*' # Автоматически при создании тега

permissions:
  contents: read

jobs:
  publish:
    runs-on: sotbi-runners
    env:
      NPM_REGISTRY_URL: 'https://npm.bazys.io'
      NPM_TOKEN: ${{ secrets['NPM_TOKEN'] }}
      NODE_AUTH_TOKEN: ${{ secrets['NPM_TOKEN'] }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.bazys.io'

      - name: Validate publish token
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi

      - name: Configure npm authentication
        run: |
          cat > "$HOME/.npmrc" << EOF
          registry=${NPM_REGISTRY_URL}
          @sotbi:registry=${NPM_REGISTRY_URL}
          //npm.bazys.io/:_authToken=${NPM_TOKEN}
          always-auth=true
          EOF

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build all packages
        run: npx nx run-many -t build --configuration=production

      - name: Publish packages
        run: npx nx run-many -t nx-release-publish

      - name: Get published version(s)
        id: version
        run: |
          VERSIONS=$(for pkg in utils models auth data-access state ui ui-ag-grid; do
            [ -f "$pkg/package.json" ] && v=$(node -p "require('./$pkg/package.json').version" 2>/dev/null) && echo "$pkg@$v"
          done | tr '\n' ' ')
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT

      - name: Send telegram message after image was built
        uses: an3park/telegram-action@v2
        with:
          chat_id: ${{ secrets.TELEGRAM_CHANNEL }}
          bot_token: ${{ secrets.TELEGRAM_TOKEN }}
          parse_mode: Markdown
          text: |
            ${{ github.actor }} published new version of ${{ github.event.inputs.package }}.
            📦 Version(s): ${{ steps.version.outputs.versions }}
            👀 changes: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            View job logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
